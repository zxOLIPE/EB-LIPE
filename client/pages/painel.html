<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Militar | EB LIPE</title>

<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/painel.css">

</head>

<body>

<header class="navbar">

<div class="logo">

<h1>EB <span>LIPE</span></h1>

<p>Painel Militar</p>

</div>

</header>

<main class="painel-container">

<div class="militar-card">

<h1>Perfil Militar</h1>

<div class="dados">

<h2>Nome Roblox</h2>
<p id="nome">Carregando...</p>

<h2>ID Roblox</h2>
<p id="id">Carregando...</p>

<h2>Patente</h2>
<p id="patente">Recruta</p>

<h2>Divisão</h2>
<p id="divisao">Nenhuma</p>

<h2>Status</h2>
<p id="status">Ativo</p>

</div>

</div>

</main>

<script>

fetch("/api/me")
.then(async response => {

    if (!response.ok) {
        window.location.href = "/";
        return;
    }

    const user = await response.json();

    document.getElementById("nome").textContent = user.nome;
    document.getElementById("id").textContent = user.id;

})
.catch(() => {

    window.location.href = "/";

});

</script>

</body>

</html>
